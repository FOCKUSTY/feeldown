<div class="max-w-2xl mx-auto mt-12 px-4">
  <h2 class="text-2xl font-bold text-(--fd-text-primary)">Новый пост</h2>
  <p class="text-(--fd-text-muted) mt-1">Поделитесь своей мыслью</p>

  <hr class="my-6 border-(--fd-border)" />

  @if (error) {
    <div class="mb-4 p-3 rounded-(--fd-radius) bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 border border-red-300 dark:border-red-800">
      {{ error }}
    </div>
  }

  <form (ngSubmit)="onSubmit()" class="space-y-5">
    <div>
      <label for="content" class="block text-sm font-medium text-(--fd-text-secondary)">Содержимое</label>
      <textarea
        id="content"
        [(ngModel)]="content"
        name="content"
        rows="8"
        required
        class="mt-1 w-full px-4 py-2 rounded-(--fd-radius) border border-(--fd-border) bg-(--fd-bg-input) text-(--fd-text-primary) focus:outline-none focus:ring-2 focus:ring-(--fd-primary) focus:border-transparent transition resize-y"
        placeholder="Напишите что-нибудь..."
      ></textarea>
    </div>

    <div class="flex items-center gap-4">
      <fd-button type="submit" [disabled]="submitting">
        {{ submitting ? 'Публикация...' : 'Опубликовать' }}
      </fd-button>
      <button
        type="button"
        (click)="router.navigate(['/'])"
        class="text-(--fd-text-muted) hover:text-(--fd-text-secondary) transition"
      >
        Отмена
      </button>
    </div>
  </form>
</div>
